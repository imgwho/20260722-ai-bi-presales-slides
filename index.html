<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI+BI 幻灯片四方案</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e5e7eb; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
    main { width: min(980px, calc(100vw - 40px)); }
    h1 { margin: 0 0 12px; font-size: 44px; color: #5eead4; letter-spacing: 0; }
    p { color: #cbd5e1; font-size: 18px; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 28px; }
    a { display: block; padding: 22px; border: 1px solid #334155; border-radius: 8px; background: #111827; color: #f8fafc; text-decoration: none; }
    a:hover { border-color: #5eead4; background: #172033; }
    strong { display: block; margin-bottom: 8px; font-size: 22px; color: #fff; }
    span { color: #94a3b8; font-size: 14px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 32px; } }
  </style>
</head>
<body>
  <main>
    <h1>资深BI工程师：AI+BI的最佳实践</h1>
    <p>同一套内容分别实现为 Slidev、Marp、remark.js、reveal.js 四个可访问版本。使用键盘左右方向键翻页。</p>
    <section class="grid" aria-label="幻灯片版本">
      <a href="./slidev/"><strong>Slidev</strong><span>工程化 Markdown 演示源稿 + 静态 HTML</span></a>
      <a href="./marp/"><strong>Marp</strong><span>适合导出 PDF 的 Markdown 演示源稿 + 静态 HTML</span></a>
      <a href="./remarkjs/"><strong>remark.js</strong><span>轻量单页 HTML 演示</span></a>
      <a href="./revealjs/"><strong>reveal.js</strong><span>网页演讲式 HTML 演示</span></a>
    </section>
  </main>
</body>
</html>
